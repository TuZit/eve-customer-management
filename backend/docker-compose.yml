  #     - /app/node_modules

  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eve_dealer_management}
      MYSQL_USER: ${MYSQL_USER:-eve_dealer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eve_dealer_password}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+07:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/customer-master-schema.mysql.sql:/docker-entrypoint-initdb.d/01-customer-master-schema.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
